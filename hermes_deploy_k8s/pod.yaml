apiVersion: v1
kind: Pod
metadata:
  name: hermes-agent
  namespace: hermes-plugin-test
  labels:
    app: hermes-agent
    mode: gateway
spec:
  restartPolicy: Never
  containers:
    - name: hermes-agent
      image: nousresearch/hermes-agent
      imagePullPolicy: Always
      command: ["hermes", "gateway", "start"]
      env:
        - name: HERMES_HOME
          value: /root/.hermes
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "2000m"
          memory: "4Gi"
